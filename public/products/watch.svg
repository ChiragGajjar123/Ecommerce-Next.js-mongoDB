<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 675" role="img" aria-label="Minimal gold analog watch">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
    <radialGradient id="dialFace" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="70%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#f5e6a3"/>
    </radialGradient>
    <linearGradient id="goldCase" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#f5d876"/>
      <stop offset="25%" stop-color="#d4a017"/>
      <stop offset="50%" stop-color="#e8c13a"/>
      <stop offset="75%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <linearGradient id="strap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b4c11"/>
      <stop offset="50%" stop-color="#8b6914"/>
      <stop offset="100%" stop-color="#6b4c11"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
    <filter id="glassFrost">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <rect width="900" height="675" fill="url(#bg)"/>
  <!-- Subtle dot grid -->
  <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.8" fill="rgba(180,140,30,0.12)"/>
  </pattern>
  <rect width="900" height="675" fill="url(#dots)"/>
  
  <g filter="url(#shadow)">
    <!-- Watch strap top -->
    <rect x="390" y="68" width="120" height="170" rx="12" fill="url(#strap)"/>
    <!-- Strap texture lines -->
    <line x1="410" y1="90" x2="480" y2="90" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <line x1="410" y1="105" x2="480" y2="105" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <line x1="410" y1="120" x2="480" y2="120" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <line x1="410" y1="135" x2="480" y2="135" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <line x1="410" y1="150" x2="480" y2="150" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <!-- Buckle hole -->
    <circle cx="450" cy="110" r="5" fill="rgba(0,0,0,0.25)"/>
    
    <!-- Watch strap bottom -->
    <rect x="390" y="437" width="120" height="175" rx="12" fill="url(#strap)"/>
    <line x1="410" y1="460" x2="480" y2="460" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <line x1="410" y1="475" x2="480" y2="475" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <line x1="410" y1="490" x2="480" y2="490" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <line x1="410" y1="505" x2="480" y2="505" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <!-- Buckle -->
    <rect x="415" y="515" width="70" height="28" rx="6" fill="#c8a020"/>
    <rect x="428" y="521" width="22" height="16" rx="3" fill="#8b5e11"/>
    
    <!-- Gold outer case -->
    <circle cx="450" cy="337" r="198" fill="url(#goldCase)"/>
    <!-- Inner bezel -->
    <circle cx="450" cy="337" r="176" fill="#1a1a1a"/>
    <!-- Dial face -->
    <circle cx="450" cy="337" r="162" fill="url(#dialFace)"/>
    <!-- Glass shine -->
    <ellipse cx="414" cy="295" rx="58" ry="38" fill="rgba(255,255,255,0.15)" transform="rotate(-20, 414, 295)"/>
    
    <!-- Hour markers -->
    <!-- 12 o'clock -->
    <rect x="446" y="186" width="8" height="24" rx="2" fill="#8b6914"/>
    <!-- 3 o'clock -->
    <rect x="600" y="333" width="24" height="8" rx="2" fill="#8b6914"/>
    <!-- 6 o'clock -->
    <rect x="446" y="464" width="8" height="24" rx="2" fill="#8b6914"/>
    <!-- 9 o'clock -->
    <rect x="276" y="333" width="24" height="8" rx="2" fill="#8b6914"/>
    <!-- Minor hour markers -->
    <rect x="432" y="194" width="4" height="14" rx="1" fill="#c8a020" transform="rotate(30 450 337)"/>
    <rect x="432" y="194" width="4" height="14" rx="1" fill="#c8a020" transform="rotate(60 450 337)"/>
    <rect x="432" y="194" width="4" height="14" rx="1" fill="#c8a020" transform="rotate(120 450 337)"/>
    <rect x="432" y="194" width="4" height="14" rx="1" fill="#c8a020" transform="rotate(150 450 337)"/>
    <rect x="432" y="194" width="4" height="14" rx="1" fill="#c8a020" transform="rotate(210 450 337)"/>
    <rect x="432" y="194" width="4" height="14" rx="1" fill="#c8a020" transform="rotate(240 450 337)"/>
    <rect x="432" y="194" width="4" height="14" rx="1" fill="#c8a020" transform="rotate(300 450 337)"/>
    <rect x="432" y="194" width="4" height="14" rx="1" fill="#c8a020" transform="rotate(330 450 337)"/>
    
    <!-- Hour hand -->
    <line x1="450" y1="337" x2="450" y2="252" stroke="#2d1b00" stroke-width="7" stroke-linecap="round"/>
    <!-- Minute hand -->
    <line x1="450" y1="337" x2="518" y2="237" stroke="#2d1b00" stroke-width="5" stroke-linecap="round"/>
    <!-- Second hand -->
    <line x1="450" y1="337" x2="390" y2="432" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Center dot -->
    <circle cx="450" cy="337" r="10" fill="url(#goldCase)"/>
    <circle cx="450" cy="337" r="5" fill="#2d1b00"/>
    
    <!-- Crown -->
    <rect x="644" y="326" width="20" height="22" rx="5" fill="url(#goldCase)"/>
    
    <!-- Subdial -->
    <circle cx="450" cy="413" r="26" fill="rgba(200,170,50,0.1)" stroke="rgba(200,170,50,0.25)" stroke-width="1"/>
    <text x="450" y="409" text-anchor="middle" font-family="serif" font-size="10" fill="#8b6914">CMG</text>
    <text x="450" y="422" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#a0810a">SWISS</text>
  </g>
</svg>
