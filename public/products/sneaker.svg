<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 675" role="img" aria-label="Everyday white sneaker">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e8f4f8"/>
    </linearGradient>
    <linearGradient id="upperMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
    <linearGradient id="sole" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="midsole" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="rgba(0,0,50,0.12)"/>
    </filter>
  </defs>
  
  <rect width="900" height="675" fill="url(#bg)"/>
  <!-- Floor shadow -->
  <ellipse cx="450" cy="570" rx="260" ry="30" fill="rgba(0,0,0,0.07)"/>
  
  <g filter="url(#shadow)">
    <!-- Outsole (bottom, dark) -->
    <path d="M 148 495 Q 148 520 200 530 L 700 530 Q 760 520 752 495 Q 740 460 660 456 L 240 456 Q 160 460 148 495 Z" fill="#2d3748"/>
    <!-- Outsole tread pattern -->
    <line x1="200" y1="520" x2="700" y2="520" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>
    <rect x="220" y="496" width="36" height="16" rx="3" fill="rgba(255,255,255,0.05)"/>
    <rect x="270" y="496" width="36" height="16" rx="3" fill="rgba(255,255,255,0.05)"/>
    <rect x="320" y="496" width="36" height="16" rx="3" fill="rgba(255,255,255,0.05)"/>
    <rect x="370" y="496" width="36" height="16" rx="3" fill="rgba(255,255,255,0.05)"/>
    <rect x="420" y="496" width="36" height="16" rx="3" fill="rgba(255,255,255,0.05)"/>
    <rect x="470" y="496" width="36" height="16" rx="3" fill="rgba(255,255,255,0.05)"/>
    <rect x="520" y="496" width="36" height="16" rx="3" fill="rgba(255,255,255,0.05)"/>
    <rect x="570" y="496" width="36" height="16" rx="3" fill="rgba(255,255,255,0.05)"/>
    <rect x="620" y="496" width="40" height="16" rx="3" fill="rgba(255,255,255,0.05)"/>
    
    <!-- Midsole -->
    <path d="M 155 460 Q 155 476 200 482 L 700 482 Q 748 476 748 460 Q 745 448 700 444 L 200 444 Q 158 448 155 460 Z" fill="url(#midsole)"/>
    <!-- Midsole details -->
    <text x="450" y="468" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#94a3b8" letter-spacing="2">CMG AIR CUSHION</text>
    
    <!-- Upper (main white body) -->
    <path d="M 180 444 L 160 310 Q 165 200 250 160 L 460 140 Q 550 130 640 180 Q 720 220 740 320 L 750 444 Z" fill="url(#upperMain)"/>
    <!-- Upper shadow/depth -->
    <path d="M 180 444 L 160 310 Q 165 200 250 160 L 460 140 Q 550 130 640 180 Q 720 220 740 320 L 750 444 Z" fill="rgba(0,0,0,0.03)"/>
    
    <!-- Perforations (toe cap area) -->
    {[0,1,2,3,4].map(row => 
      [0,1,2,3,4,5].map(col => 
        `<circle cx="${220 + col * 26}" cy="${260 + row * 26}" r="4" fill="rgba(200,210,220,0.5)"/>`
      ).join('')
    ).join('')}
    
    <!-- Overlays / panels -->
    <!-- Toe cap overlay -->
    <path d="M 160 340 Q 165 200 250 165 L 310 158 L 290 380 Z" fill="rgba(240,244,248,0.6)" stroke="rgba(200,210,220,0.5)" stroke-width="1"/>
    <!-- Side panel -->
    <path d="M 570 175 Q 640 188 720 240 L 750 444 L 600 444 Z" fill="rgba(230,236,242,0.5)" stroke="rgba(200,210,220,0.4)" stroke-width="1"/>
    
    <!-- Lacing system -->
    <path d="M 300 380 L 660 360" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="1 3"/>
    <!-- Eyelets and laces -->
    <circle cx="310" cy="390" r="6" fill="white" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="370" cy="382" r="6" fill="white" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="430" cy="376" r="6" fill="white" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="490" cy="372" r="6" fill="white" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="550" cy="368" r="6" fill="white" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="610" cy="365" r="6" fill="white" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="640" cy="363" r="6" fill="white" stroke="#94a3b8" stroke-width="2"/>
    <!-- Lace -->
    <path d="M 316 388 Q 340 370 364 382" stroke="#e2e8f0" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 376 380 Q 400 362 424 376" stroke="#e2e8f0" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 436 374 Q 460 356 484 371" stroke="#e2e8f0" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 496 370 Q 520 352 544 367" stroke="#e2e8f0" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 556 366 Q 580 350 604 363" stroke="#e2e8f0" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 616 363 Q 628 358 636 362" stroke="#e2e8f0" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Tongue -->
    <path d="M 390 170 Q 400 190 400 390 L 470 390 Q 470 190 480 170 Z" fill="white" stroke="rgba(200,210,220,0.5)" stroke-width="1"/>
    <!-- Tongue brand label -->
    <rect x="412" y="185" width="46" height="30" rx="4" fill="#0f172a"/>
    <text x="435" y="205" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="white">CMG</text>
    
    <!-- Collar / ankle area -->
    <path d="M 180 444 Q 200 380 280 360 L 600 350 Q 700 360 750 444 Z" fill="rgba(240,244,248,0.4)"/>
    <!-- Collar padding stitch -->
    <path d="M 185 440 Q 220 380 300 362 L 590 354 Q 695 364 745 440" stroke="rgba(200,210,220,0.6)" stroke-width="2" fill="none" stroke-dasharray="6 4"/>
    
    <!-- Heel tab -->
    <path d="M 720 380 L 744 300 L 756 300 L 760 380 Z" fill="white" stroke="rgba(200,210,220,0.4)" stroke-width="1"/>
    <rect x="730" y="330" width="20" height="16" rx="2" fill="#0f172a"/>
    <text x="740" y="342" text-anchor="middle" font-family="sans-serif" font-size="6" fill="white">CMG</text>
    
    <!-- Toe highlight -->
    <ellipse cx="225" cy="280" rx="32" ry="20" fill="rgba(255,255,255,0.7)" transform="rotate(-30 225 280)"/>
  </g>
</svg>
