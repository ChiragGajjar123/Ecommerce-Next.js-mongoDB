<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 675" role="img" aria-label="Tailored transit jacket">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="fabricBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="60%" stop-color="#162d4a"/>
      <stop offset="100%" stop-color="#0f1f33"/>
    </linearGradient>
    <linearGradient id="fabricHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <linearGradient id="collar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#253f5f"/>
      <stop offset="100%" stop-color="#162d4a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="rgba(0,0,50,0.2)"/>
    </filter>
  </defs>
  <rect width="900" height="675" fill="url(#bg)"/>
  
  <!-- Subtle texture -->
  <pattern id="fabric" width="6" height="6" patternUnits="userSpaceOnUse">
    <rect width="6" height="6" fill="none"/>
    <circle cx="3" cy="3" r="0.8" fill="rgba(100,149,237,0.08)"/>
  </pattern>
  <rect width="900" height="675" fill="url(#fabric)"/>
  
  <!-- Jacket body -->
  <g filter="url(#shadow)">
    <!-- Main jacket shape -->
    <path d="M 290 100 L 260 160 L 200 190 L 175 560 L 725 560 L 700 190 L 640 160 L 610 100 Z" fill="url(#fabricBody)"/>
    <!-- Fabric highlight -->
    <path d="M 290 100 L 260 160 L 200 190 L 175 560 L 725 560 L 700 190 L 640 160 L 610 100 Z" fill="url(#fabricHighlight)"/>
    
    <!-- Left panel -->
    <path d="M 290 100 L 260 160 L 220 200 L 200 560 L 450 560 L 450 200 L 420 140 Z" fill="rgba(255,255,255,0.03)"/>
    
    <!-- Center placket / zip -->
    <rect x="436" y="190" width="28" height="368" rx="4" fill="rgba(255,255,255,0.06)"/>
    <!-- Zip teeth -->
    {Array.from({length: 18}).map((_, i) => (
      `<rect x="440" y="${206 + i * 19}" width="20" height="8" rx="2" fill="rgba(200,200,220,0.4)"/>`
    )).join('')}
    <!-- Zip pull -->
    <rect x="436" y="196" width="28" height="20" rx="4" fill="#4a90d9" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    
    <!-- Left chest pocket -->
    <rect x="230" y="240" width="110" height="80" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    <line x1="230" y1="264" x2="340" y2="264" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- Right chest pocket -->
    <rect x="560" y="240" width="110" height="80" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    <line x1="560" y1="264" x2="670" y2="264" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    
    <!-- Lower pockets -->
    <rect x="200" y="380" width="170" height="100" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    <rect x="530" y="380" width="170" height="100" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    
    <!-- Collar -->
    <path d="M 360 100 L 320 160 L 360 200 L 450 200 L 450 140 Z" fill="url(#collar)"/>
    <path d="M 540 100 L 580 160 L 540 200 L 450 200 L 450 140 Z" fill="url(#collar)"/>
    
    <!-- Collar fold lines -->
    <line x1="370" y1="120" x2="440" y2="190" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
    <line x1="530" y1="120" x2="460" y2="190" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
    
    <!-- Sleeve hints -->
    <path d="M 175 200 L 100 280 L 90 420 L 175 420 Z" fill="url(#fabricBody)"/>
    <path d="M 725 200 L 800 280 L 810 420 L 725 420 Z" fill="url(#fabricBody)"/>
    
    <!-- CMG label inside collar -->
    <rect x="416" y="105" width="68" height="22" rx="4" fill="rgba(255,255,255,0.08)"/>
    <text x="450" y="121" text-anchor="middle" font-family="serif" font-size="11" font-weight="bold" fill="rgba(200,180,120,0.9)">CMG</text>
    
    <!-- Hem stitching -->
    <line x1="175" y1="548" x2="725" y2="548" stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-dasharray="10 6"/>
  </g>
</svg>
