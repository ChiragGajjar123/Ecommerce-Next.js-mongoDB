<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 675" role="img" aria-label="Modular desk organizer set">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a97a"/>
      <stop offset="50%" stop-color="#b08d60"/>
      <stop offset="100%" stop-color="#9a7a50"/>
    </linearGradient>
    <linearGradient id="woodSide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a6a40"/>
      <stop offset="100%" stop-color="#6a4e28"/>
    </linearGradient>
    <linearGradient id="tray" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="traySide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="16" stdDeviation="20" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
  </defs>
  
  <rect width="900" height="675" fill="url(#bg)"/>
  <!-- Desk surface hint -->
  <rect x="0" y="450" width="900" height="225" fill="url(#wood)" opacity="0.25"/>
  <line x1="0" y1="450" x2="900" y2="450" stroke="rgba(160,120,70,0.2)" stroke-width="2"/>
  
  <g filter="url(#shadow)">
    <!-- Main desk organizer base (wood) -->
    <rect x="180" y="200" width="540" height="260" rx="12" fill="url(#wood)"/>
    <!-- Wood grain lines -->
    <line x1="200" y1="200" x2="200" y2="460" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    <line x1="260" y1="200" x2="260" y2="460" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    <line x1="360" y1="200" x2="360" y2="460" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    <line x1="540" y1="200" x2="540" y2="460" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    <line x1="640" y1="200" x2="640" y2="460" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    <line x1="700" y1="200" x2="700" y2="460" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    <!-- Wood top highlight -->
    <rect x="180" y="200" width="540" height="18" rx="12" fill="rgba(255,255,255,0.12)"/>
    <!-- Front panel -->
    <rect x="180" y="440" width="540" height="20" rx="4" fill="url(#woodSide)"/>
    
    <!-- Pen/pencil holder (cylinder left) -->
    <ellipse cx="280" cy="200" rx="56" ry="22" fill="url(#traySide)"/>
    <rect x="224" y="90" width="112" height="110" fill="url(#tray)"/>
    <ellipse cx="280" cy="90" rx="56" ry="22" fill="#e2e8f0"/>
    <!-- Pens inside -->
    <rect x="258" y="78" width="6" height="100" rx="3" fill="#4a90d9"/>
    <rect x="271" y="82" width="6" height="96" rx="3" fill="#e74c3c"/>
    <rect x="284" y="75" width="6" height="103" rx="3" fill="#2d2d2d"/>
    <rect x="297" y="80" width="6" height="98" rx="3" fill="#27ae60"/>
    <rect x="310" y="85" width="6" height="93" rx="3" fill="#f39c12"/>
    
    <!-- Small tray (center) -->
    <rect x="352" y="280" width="196" height="160" rx="8" fill="url(#tray)"/>
    <rect x="352" y="430" width="196" height="14" rx="4" fill="url(#traySide)"/>
    <!-- Items in tray: paperclips/cards -->
    <rect x="368" y="296" width="80" height="52" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <line x1="376" y1="308" x2="440" y2="308" stroke="#cbd5e1" stroke-width="1.5"/>
    <line x1="376" y1="318" x2="440" y2="318" stroke="#cbd5e1" stroke-width="1.5"/>
    <line x1="376" y1="328" x2="420" y2="328" stroke="#cbd5e1" stroke-width="1.5"/>
    <!-- Post-it note -->
    <rect x="460" y="296" width="72" height="64" rx="2" fill="#fef08a"/>
    <line x1="468" y1="310" x2="524" y2="310" stroke="#ca8a04" stroke-width="1.2"/>
    <line x1="468" y1="320" x2="524" y2="320" stroke="#ca8a04" stroke-width="1.2"/>
    <line x1="468" y1="330" x2="510" y2="330" stroke="#ca8a04" stroke-width="1.2"/>
    
    <!-- Right tray (tall) -->
    <rect x="572" y="170" width="120" height="280" rx="8" fill="url(#tray)"/>
    <rect x="572" y="440" width="120" height="14" rx="4" fill="url(#traySide)"/>
    <!-- Books/files in right tray -->
    <rect x="584" y="200" width="22" height="220" rx="3" fill="#3b82f6"/>
    <rect x="608" y="195" width="18" height="225" rx="3" fill="#10b981"/>
    <rect x="628" y="205" width="20" height="215" rx="3" fill="#f59e0b"/>
    <rect x="650" y="198" width="30" height="222" rx="3" fill="#6366f1"/>
    <!-- File labels -->
    <rect x="586" y="204" width="18" height="10" rx="1" fill="rgba(255,255,255,0.7)"/>
    <rect x="610" y="204" width="14" height="10" rx="1" fill="rgba(255,255,255,0.7)"/>
    
    <!-- Rubber feet -->
    <ellipse cx="220" cy="458" rx="16" ry="6" fill="#7a6048"/>
    <ellipse cx="680" cy="458" rx="16" ry="6" fill="#7a6048"/>
    <ellipse cx="340" cy="458" rx="14" ry="5" fill="#7a6048"/>
    <ellipse cx="560" cy="458" rx="14" ry="5" fill="#7a6048"/>
  </g>
</svg>
